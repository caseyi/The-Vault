version: '3.8'

# ── Image source ──────────────────────────────────────────────────────────────
# Images are built automatically by GitHub Actions and published to GHCR.
# Run ./update.sh on your NAS to pull the latest build.
#
# To build locally instead (e.g. for development), comment out the `image:`
# lines and uncomment the `build:` lines.
# ─────────────────────────────────────────────────────────────────────────────
#
# ── Configuring library paths ───────────────────────────────────────────────
# You no longer edit paths in this file by hand. Copy `.env.example` to `.env`
# and set your folders there:
#
#   cp .env.example .env
#   nano .env
#
# All the ${...} values below are read from that .env file.
# See the README ("Setting your library folders") for full details.
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    image: ghcr.io/caseyi/the-vault-backend:latest
    # build: ./backend       # ← uncomment to build locally
    restart: unless-stopped
    volumes:
      # ── Primary library (a folder on THIS machine / local NAS volume) ────────
      # Set LIBRARY_HOST_PATH and LIBRARY_NAME in .env. It is mounted read-only
      # under /library/<LIBRARY_NAME> inside the container.
      - ${LIBRARY_HOST_PATH:-/volume1/STL Archive}:/library/${LIBRARY_NAME:-STL Archive}:ro

      # ── A second LOCAL folder (optional) ─────────────────────────────────────
      # Uncomment and set LIBRARY2_* in .env to add another local folder.
      # - ${LIBRARY2_HOST_PATH}:/library/${LIBRARY2_NAME:-More Prints}:ro

      # ── A folder on a REMOTE NAS over SMB / CIFS (optional) ──────────────────
      # Set the SMB_* vars in .env, then uncomment BOTH this line and the
      # `smb_library` volume definition at the bottom of this file.
      # - smb_library:/library/${SMB_NAME:-remote}:ro

      # Database and extracted images — never remove this line
      - vault_data:/data

    environment:
      - LIBRARY_PATH=/library
      - DB_PATH=/data/vault.db
      - IMAGES_DIR=/data/images
      # Claude API key — loaded from .env file (never commit that file)
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      # Optional: override the Claude model used for AI features (default: claude-haiku-4-5-20251001)
      # - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-haiku-4-5-20251001}

  frontend:
    image: ghcr.io/caseyi/the-vault-frontend:latest
    # build: ./frontend      # ← uncomment to build locally
    restart: unless-stopped
    ports:
      # Access the app at http://your-nas-ip:8484
      # Change the host port (left of the colon) with WEB_PORT in .env.
      - "${WEB_PORT:-8484}:80"
    depends_on:
      - backend

volumes:
  # vault_data is a named Docker volume — it persists across container
  # restarts, image updates, and docker-compose down/up.
  # Your database and images live here and are NEVER wiped by updates.
  vault_data:

  # ── Remote SMB / CIFS library (optional) ──────────────────────────────────
  # Uncomment this whole block AND the `- smb_library:...` line above to mount
  # a share from another NAS as a library root. Credentials come from .env.
  #
  #   //SMB_HOST/SMB_SHARE  →  /library/<SMB_NAME>
  #
  # smb_library:
  #   driver: local
  #   driver_opts:
  #     type: cifs
  #     device: "//${SMB_HOST}/${SMB_SHARE}"
  #     o: "username=${SMB_USER},password=${SMB_PASS},vers=3.0,ro,uid=1000,gid=1000,iocharset=utf8,nounix,noserverino"
